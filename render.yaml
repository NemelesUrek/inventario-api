# Blueprint de Render: conecta el repo en render.com/blueprints y crea el servicio solo.
services:
  - type: web
    name: inventario-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /actuator/health
    autoDeploy: true
    envVars:
      # Demo pública: Swagger accesible sin login (por defecto es solo-admin).
      - key: DOCS_PUBLIC
        value: "true"
