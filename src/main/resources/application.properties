spring.application.name=inventario-api

# Render (u otro PaaS) inyecta el puerto en la variable PORT; local usa 8080.
server.port=${PORT:8080}

# Base de datos H2 EN ARCHIVO: modo escritorio/Windows, los datos PERSISTEN localmente.
# app.data.dir lo fija el launcher del .exe (ej. %APPDATA%/Stockly); en dev por defecto ./data.
spring.datasource.url=jdbc:h2:file:${app.data.dir:./data}/stockly;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
# Contraseña de BD por variable de entorno (vacía por defecto = compatible con
# los datos H2 ya creados; se puede fijar con DB_PASSWORD en un despliegue nuevo).
spring.datasource.password=${DB_PASSWORD:}
# update: evoluciona el esquema conservando los datos del usuario (no borra como create-drop).
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# Consola H2 deshabilitada en la demo pública (no exponer una consola SQL a internet).
spring.h2.console.enabled=false

# Swagger UI (demo clicable) en /swagger-ui.html
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
# Acotar el escaneo de OpenAPI a los controllers reales (menos trabajo al arrancar).
springdoc.packages-to-scan=com.nemeles.inventario.web

# --- Arranque en frío más rápido y liviano (Render free / 512MB) ---
# Difiere la creación de beans (incl. el escaneo de springdoc) hasta su primer uso:
# el contexto queda listo y el health responde antes -> Render marca sano antes.
spring.main.lazy-initialization=true
spring.jmx.enabled=false

# Actuator: health para los chequeos del PaaS
management.endpoints.web.exposure.include=health,info

# Subida de adjuntos (fotos de mercancía): límites de multipart
spring.servlet.multipart.max-file-size=8MB
spring.servlet.multipart.max-request-size=10MB

# --- Endurecimiento de seguridad ---
# Cookie de sesión: inaccesible por JS y SameSite=Strict (mitiga CSRF y robo por XSS).
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=strict
# No filtrar mensajes internos ni stacktraces en las respuestas de error por defecto.
server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-binding-errors=never
# Swagger/OpenAPI: SOLO admin por defecto. Para la demo pública de Render: DOCS_PUBLIC=true
app.docs.public=${DOCS_PUBLIC:false}
