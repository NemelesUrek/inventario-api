spring.application.name=inventario-api

# Render (u otro PaaS) inyecta el puerto en la variable PORT; local usa 8080.
server.port=${PORT:8080}

# Base de datos H2 en memoria (la demo no necesita instalar nada).
spring.datasource.url=jdbc:h2:mem:inventario;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false

# Consola H2 opcional para inspeccionar la BD: /h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Swagger UI (demo clicable) en /swagger-ui.html
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# Actuator: health para los chequeos del PaaS
management.endpoints.web.exposure.include=health,info
