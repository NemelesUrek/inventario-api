# ==========================================================================
#  Perfil HTTPS (opcional) — para usar la CÁMARA DEL TELÉFONO en la red local
# --------------------------------------------------------------------------
#  Los navegadores solo permiten la cámara (getUserMedia) en un contexto
#  seguro: HTTPS o localhost. Para escanear desde el celular por WiFi hace
#  falta servir la app por HTTPS, aunque sea con un certificado self-signed.
#
#  Pasos:
#    1) Genera el certificado una sola vez:   scripts\generar-https.ps1
#    2) Arranca la app con este perfil:       --spring.profiles.active=https
#    3) En el teléfono abre  https://<IP-LAN>:8443  (acepta el aviso de
#       certificado self-signed una vez) y ya puedes escanear con la cámara.
# ==========================================================================

server.port=8443
server.ssl.enabled=true
server.ssl.key-store=${app.data.dir:./data}/stockly-https.p12
server.ssl.key-store-type=PKCS12
server.ssl.key-store-password=stockly
server.ssl.key-alias=stockly
